<section class="grid gap-6 xl:grid-cols-[0.9fr_1.1fr]">
  <article class="glass-card rounded-[2rem] p-6">
    <p class="eyebrow">Perfil</p>
    <h1 class="mt-3 text-3xl">Ajustes de aprendizaje</h1>
    <p class="mt-2 text-[var(--muted)]">Edita tu perfil base para que el sistema adapte mejor tus planes, sesiones y recordatorios.</p>
  </article>

  <article class="glass-card rounded-[2rem] p-6">
    <form class="grid gap-4 md:grid-cols-2" [formGroup]="form">
      <label class="block md:col-span-2">
        <span class="mb-2 block text-sm font-medium">Nombre completo</span>
        <input class="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3" formControlName="full_name" type="text" />
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium">Rol profesional</span>
        <input class="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3" formControlName="professional_role" type="text" />
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium">Certificacion</span>
        <input class="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3" formControlName="target_certification" type="text" />
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium">Horas por semana</span>
        <input class="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3" formControlName="weekly_hours_available" type="number" />
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium">Horario preferido</span>
        <select class="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3" formControlName="preferred_time">
          <option value="morning">Morning</option>
          <option value="afternoon">Afternoon</option>
          <option value="night">Night</option>
        </select>
      </label>
      <label class="block md:col-span-2">
        <span class="mb-2 block text-sm font-medium">Estilo de aprendizaje</span>
        <input class="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3" formControlName="learning_style" type="text" />
      </label>
      <div class="md:col-span-2">
        <button class="rounded-2xl bg-[var(--hero-strong)] px-5 py-3 font-semibold text-white" type="button" (click)="save()">
          Guardar cambios
        </button>
      </div>
    </form>
  </article>
</section>
