<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RetAIm — Retain Aim</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0B0F;
    --purple-dim: rgba(168,85,247,0.08);
    --purple-mid: rgba(168,85,247,0.35);
    --purple-glow: #A855F7;
    --purple-bright: #BF5AF2;
    --purple-line: rgba(191,90,242,0.7);
    --text-main: #EDE9FE;
    --text-muted: rgba(168,85,247,0.6);
    --glass: rgba(168,85,247,0.06);
    --glass-border: rgba(168,85,247,0.18);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text-main);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
  }

  /* ── INTRO ───────────────────────────────────────────────── */
  #intro {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    background: var(--bg);
    transition: opacity 0.6s ease;
  }
  #intro.fade-out { opacity: 0; pointer-events: none; }

  #cube-canvas {
    position: absolute;
    transition: transform 1.2s cubic-bezier(0.76,0,0.24,1),
                width 1.2s cubic-bezier(0.76,0,0.24,1),
                height 1.2s cubic-bezier(0.76,0,0.24,1),
                top 1.2s cubic-bezier(0.76,0,0.24,1),
                left 1.2s cubic-bezier(0.76,0,0.24,1);
  }
  #cube-canvas.shrink {
    position: fixed;
    top: 22px !important;
    left: 24px !important;
    width: 52px !important;
    height: 52px !important;
    transform: none !important;
  }

  #brand-text {
    position: fixed;
    top: 20px; left: 86px;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateX(-32px);
    transition: opacity 0.7s ease 0.2s, transform 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s;
    z-index: 200;
  }
  #brand-text.visible { opacity: 1; transform: translateX(0); }

  #brand-text .title {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem; font-weight: 800;
    letter-spacing: 0.04em;
    line-height: 1;
    background: linear-gradient(90deg, #BF5AF2, #A855F7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #brand-text .sub {
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── MAIN APP ─────────────────────────────────────────────── */
  #app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease 0.3s;
  }
  #app.visible { opacity: 1; pointer-events: all; }

  /* top bar space */
  #topbar {
    height: 72px; flex-shrink: 0;
    display: flex; align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(11,11,15,0.6);
    backdrop-filter: blur(12px);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--purple-glow);
    box-shadow: 0 0 8px var(--purple-glow);
    animation: pulse-dot 2s ease-in-out infinite;
    margin-left: auto;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-label {
    font-size: 0.7rem; letter-spacing: 0.2em;
    color: var(--text-muted); margin-left: 8px; margin-right: 16px;
    text-transform: uppercase;
  }
  .corner-decor {
    font-size: 0.65rem; letter-spacing: 0.15em;
    color: rgba(168,85,247,0.3); text-transform: uppercase;
  }

  /* body */
  #body {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 24px 24px 0;
    overflow: hidden;
    position: relative;
  }

  /* ── HUD CENTER ───────────────────────────────────────────── */
  #hud-wrap {
    flex: 1; width: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    min-height: 0;
  }

  #hud-canvas {
    width: min(560px, 90vw);
    height: 140px;
    display: block;
  }

  /* rotating dials */
  .dial-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(168,85,247,0.12);
    pointer-events: none;
  }
  .dial-ring::after {
    content: '';
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--purple-glow);
    box-shadow: 0 0 6px var(--purple-glow);
    top: -3px; left: 50%; transform: translateX(-50%);
  }
  #ring1 { width: 200px; height: 200px; top: calc(50% - 100px); left: calc(50% - 100px); animation: spin 12s linear infinite; }
  #ring2 { width: 290px; height: 290px; top: calc(50% - 145px); left: calc(50% - 145px); animation: spin-rev 18s linear infinite; }
  #ring3 { width: 380px; height: 380px; top: calc(50% - 190px); left: calc(50% - 190px); animation: spin 28s linear infinite; border-color: rgba(168,85,247,0.06); }
  @keyframes spin     { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes spin-rev { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }

  /* tick marks on ring2 */
  .ticks {
    position: absolute;
    width: 290px; height: 290px;
    top: calc(50% - 145px); left: calc(50% - 145px);
    border-radius: 50%;
    animation: spin-rev 18s linear infinite;
    pointer-events: none;
  }

  /* chat area */
  #chat-wrap {
    width: min(640px, 96vw);
    max-height: 38vh;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px;
    padding: 0 0 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--purple-mid) transparent;
  }
  #chat-wrap::-webkit-scrollbar { width: 4px; }
  #chat-wrap::-webkit-scrollbar-track { background: transparent; }
  #chat-wrap::-webkit-scrollbar-thumb { background: var(--purple-mid); border-radius: 2px; }

  .msg {
    display: flex; gap: 10px;
    animation: msg-in 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes msg-in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.05em;
  }
  .msg.ai .msg-avatar {
    background: linear-gradient(135deg, rgba(168,85,247,0.3), rgba(191,90,242,0.15));
    border: 1px solid var(--glass-border);
    color: var(--purple-glow);
  }
  .msg.user .msg-avatar {
    background: rgba(168,85,247,0.12);
    border: 1px solid rgba(168,85,247,0.2);
    color: var(--text-muted);
  }
  .msg-bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 2px 14px 14px 14px;
    font-size: 0.9rem; line-height: 1.6;
    letter-spacing: 0.01em;
  }
  .msg.ai .msg-bubble {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-top-left-radius: 2px;
    color: var(--text-main);
  }
  .msg.user .msg-bubble {
    background: rgba(168,85,247,0.12);
    border: 1px solid rgba(168,85,247,0.22);
    border-top-right-radius: 2px;
    color: var(--text-main);
    text-align: right;
  }

  .cursor-blink {
    display: inline-block; width: 2px; height: 14px;
    background: var(--purple-glow);
    margin-left: 2px; vertical-align: middle;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── INPUT BAR ────────────────────────────────────────────── */
  #input-bar {
    width: min(640px, 96vw);
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: rgba(11,11,15,0.8);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    margin-bottom: 24px;
    backdrop-filter: blur(16px);
    flex-shrink: 0;
  }
  #user-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text-main);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem; letter-spacing: 0.02em;
  }
  #user-input::placeholder { color: rgba(168,85,247,0.35); }

  #send-btn {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, #A855F7, #BF5AF2);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  #send-btn:hover { box-shadow: 0 0 18px rgba(168,85,247,0.5); transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn svg { width: 16px; height: 16px; }

  /* ambient glow */
  .glow-orb {
    position: fixed; border-radius: 50%;
    filter: blur(90px); pointer-events: none; z-index: 0;
  }
  #orb1 { width: 480px; height: 480px; background: rgba(168,85,247,0.07); top: -120px; right: -80px; }
  #orb2 { width: 360px; height: 360px; background: rgba(191,90,242,0.05); bottom: -80px; left: -60px; }

  /* scanline texture */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 1000; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
  }
</style>
</head>
<body>

<!-- Ambient orbs -->
<div class="glow-orb" id="orb1"></div>
<div class="glow-orb" id="orb2"></div>

<!-- ── INTRO ── -->
<div id="intro">
  <canvas id="cube-canvas"></canvas>
</div>

<!-- Brand text (persists after intro) -->
<div id="brand-text">
  <span class="title">RetAIm</span>
  <span class="sub">Retain Aim</span>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <div id="topbar">
    <div style="width:52px"></div><!-- space for logo -->
    <div style="margin-left:8px">
      <span class="corner-decor">v2.4.1 / neural-core</span>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center">
      <span class="corner-decor">SYS ACTIVE</span>
      <div class="status-dot" style="margin-left:10px;margin-right:0"></div>
    </div>
  </div>

  <div id="body">
    <!-- Rotating dial rings -->
    <div id="ring1" class="dial-ring"></div>
    <div id="ring2" class="dial-ring"></div>
    <div id="ring3" class="dial-ring"></div>

    <!-- HUD waveform -->
    <div id="hud-wrap">
      <canvas id="hud-canvas"></canvas>
    </div>

    <!-- Chat -->
    <div id="chat-wrap"></div>

    <!-- Input -->
    <div id="input-bar">
      <input id="user-input" type="text" placeholder="Ask RetAIm anything..." autocomplete="off" />
      <button id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   NEURAL CUBE CANVAS
═══════════════════════════════════════════════════════════ */
(function () {
  const canvas = document.getElementById('cube-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, angle = 0, shrunk = false;
  let animFrame;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    canvas.style.top    = '0px';
    canvas.style.left   = '0px';
  }
  window.addEventListener('resize', () => { if (!shrunk) resize(); });
  resize();

  // Metatron's Cube / Sacred-geometry inspired 3D cube + inner star
  function project(x, y, z, cx, cy, scale) {
    const f = scale / (scale + z);
    return { x: cx + x * f, y: cy + y * f };
  }

  function drawNet(cx, cy, r, rot) {
    ctx.clearRect(0, 0, W, H);

    // outer glow circle
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.2);
    grad.addColorStop(0, 'rgba(168,85,247,0.06)');
    grad.addColorStop(1, 'rgba(168,85,247,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, r * 1.2, 0, Math.PI * 2);
    ctx.fill();

    const s = r * 0.72;
    const cube = [
      [-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],
      [-s,-s, s],[s,-s, s],[s,s, s],[-s,s, s]
    ];
    const ry = rot, rx = rot * 0.42;
    const cos1 = Math.cos(ry), sin1 = Math.sin(ry);
    const cos2 = Math.cos(rx), sin2 = Math.sin(rx);

    function rotVec([x,y,z]) {
      let nx = x*cos1 - z*sin1, nz = x*sin1 + z*cos1;
      let ny = y*cos2 - nz*sin2, nz2= y*sin2 + nz*cos2;
      return [nx, ny, nz2];
    }

    const pts = cube.map(v => {
      const [rx2,ry2,rz2] = rotVec(v);
      return project(rx2, ry2, rz2, cx, cy, r * 2.2);
    });

    const edges = [
      [0,1],[1,2],[2,3],[3,0],
      [4,5],[5,6],[6,7],[7,4],
      [0,4],[1,5],[2,6],[3,7]
    ];
    // also draw face diagonals (Metatron cross-connections)
    const extras = [
      [0,2],[1,3],[4,6],[5,7],
      [0,6],[1,7],[2,4],[3,5],
      [0,5],[1,4],[2,7],[3,6]
    ];

    // draw extra inner lines
    ctx.save();
    extras.forEach(([a,b]) => {
      ctx.beginPath();
      ctx.moveTo(pts[a].x, pts[a].y);
      ctx.lineTo(pts[b].x, pts[b].y);
      ctx.strokeStyle = 'rgba(168,85,247,0.09)';
      ctx.lineWidth = 0.6;
      ctx.stroke();
    });

    // draw cube edges
    edges.forEach(([a,b]) => {
      ctx.beginPath();
      ctx.moveTo(pts[a].x, pts[a].y);
      ctx.lineTo(pts[b].x, pts[b].y);
      ctx.strokeStyle = 'rgba(168,85,247,0.55)';
      ctx.lineWidth = 1.1;
      ctx.shadowColor = '#A855F7';
      ctx.shadowBlur = 6;
      ctx.stroke();
      ctx.shadowBlur = 0;
    });

    // draw nodes
    pts.forEach((p, i) => {
      const pulse = 0.8 + 0.2 * Math.sin(Date.now() * 0.002 + i);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4.5 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = '#BF5AF2';
      ctx.shadowColor = '#BF5AF2';
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    // center node
    const cp = project(0, 0, 0, cx, cy, r * 2.2);
    const cp2 = project(0, 0, 0, cx, cy, r * 2.2);
    ctx.beginPath();
    ctx.arc(cp2.x, cp2.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#A855F7';
    ctx.shadowColor = '#A855F7';
    ctx.shadowBlur = 18;
    ctx.fill();
    ctx.shadowBlur = 0;

    // surrounding orbit dots (Metatron pattern)
    const orbitR = r * 0.9;
    const nOrbit = 6;
    for (let i = 0; i < nOrbit; i++) {
      const a = (i / nOrbit) * Math.PI * 2 + rot * 0.6;
      const ox = cx + Math.cos(a) * orbitR;
      const oy = cy + Math.sin(a) * orbitR;
      // line to center
      ctx.beginPath();
      ctx.moveTo(cx, cy); ctx.lineTo(ox, oy);
      ctx.strokeStyle = 'rgba(191,90,242,0.18)';
      ctx.lineWidth = 0.7; ctx.stroke();
      // line to neighbors
      const a2 = ((i+1) / nOrbit) * Math.PI * 2 + rot * 0.6;
      const ox2 = cx + Math.cos(a2) * orbitR;
      const oy2 = cy + Math.sin(a2) * orbitR;
      ctx.beginPath();
      ctx.moveTo(ox, oy); ctx.lineTo(ox2, oy2);
      ctx.strokeStyle = 'rgba(191,90,242,0.28)';
      ctx.lineWidth = 0.9; ctx.stroke();
      // dot
      const p2 = 0.85 + 0.15 * Math.sin(Date.now() * 0.003 + i * 1.2);
      ctx.beginPath(); ctx.arc(ox, oy, 3.5 * p2, 0, Math.PI * 2);
      ctx.fillStyle = '#A855F7';
      ctx.shadowColor = '#A855F7'; ctx.shadowBlur = 10;
      ctx.fill(); ctx.shadowBlur = 0;
    }
    ctx.restore();
  }

  function loop() {
    if (shrunk) return;
    angle += 0.006;
    const cx = W / 2, cy = H / 2;
    const r = Math.min(W, H) * 0.28;
    drawNet(cx, cy, r, angle);
    animFrame = requestAnimationFrame(loop);
  }
  loop();

  /* Shrink into logo position */
  window.shrinkCube = function () {
    shrunk = true;
    cancelAnimationFrame(animFrame);

    const LOGO_SIZE = 52;
    canvas.style.transition = 'top 1.1s cubic-bezier(0.76,0,0.24,1), left 1.1s cubic-bezier(0.76,0,0.24,1), width 1.1s cubic-bezier(0.76,0,0.24,1), height 1.1s cubic-bezier(0.76,0,0.24,1)';
    canvas.style.position = 'fixed';
    canvas.style.top  = '22px';
    canvas.style.left = '24px';
    canvas.style.width  = LOGO_SIZE + 'px';
    canvas.style.height = LOGO_SIZE + 'px';
    canvas.style.zIndex = '200';

    // keep drawing small cube
    let a2 = angle;
    function miniLoop() {
      const mc = canvas.getContext('2d');
      mc.clearRect(0, 0, canvas.width, canvas.height);
      // Re-draw at original canvas size but into small element via CSS scale
      drawNet(canvas.width/2, canvas.height/2, Math.min(canvas.width,canvas.height)*0.28, a2);
      a2 += 0.006;
      requestAnimationFrame(miniLoop);
    }
    miniLoop();
  };
})();

/* ═══════════════════════════════════════════════════════════
   HUD WAVEFORM CANVAS
═══════════════════════════════════════════════════════════ */
(function () {
  const canvas = document.getElementById('hud-canvas');
  const ctx = canvas.getContext('2d');
  let speaking = false;
  let speakPhase = 0;
  let waveIntensity = 0; // 0 = flat, 1 = full wave

  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width  = rect.width  * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
  }
  window.addEventListener('resize', resize);
  setTimeout(resize, 100);

  function drawHUD() {
    const W = canvas.width / devicePixelRatio;
    const H = canvas.height / devicePixelRatio;
    ctx.clearRect(0, 0, W, H);

    speakPhase += 0.045;
    if (speaking) {
      waveIntensity = Math.min(1, waveIntensity + 0.04);
    } else {
      waveIntensity = Math.max(0, waveIntensity - 0.03);
    }

    const cy = H / 2;
    const x0 = 20, x1 = W - 20;
    const len = x1 - x0;
    const nPts = 200;

    // draw 3 layers of waves
    const layers = [
      { amp: 36, freq: 2.8,  speed: 1.0, alpha: 0.9,  lw: 2.2, blur: 14 },
      { amp: 22, freq: 5.1,  speed: 1.6, alpha: 0.5,  lw: 1.2, blur: 8  },
      { amp: 14, freq: 8.3,  speed: 2.4, alpha: 0.25, lw: 0.8, blur: 4  },
    ];

    layers.forEach(({ amp, freq, speed, alpha, lw, blur }) => {
      ctx.beginPath();
      for (let i = 0; i <= nPts; i++) {
        const t = i / nPts;
        const x = x0 + t * len;
        const envelope = Math.sin(Math.PI * t); // taper at edges
        const y = cy + Math.sin(t * Math.PI * 2 * freq + speakPhase * speed) * amp * waveIntensity * envelope;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      const grad = ctx.createLinearGradient(x0, 0, x1, 0);
      grad.addColorStop(0,   `rgba(168,85,247,0)`);
      grad.addColorStop(0.2, `rgba(168,85,247,${alpha})`);
      grad.addColorStop(0.5, `rgba(191,90,242,${alpha})`);
      grad.addColorStop(0.8, `rgba(168,85,247,${alpha})`);
      grad.addColorStop(1,   `rgba(168,85,247,0)`);

      ctx.strokeStyle = grad;
      ctx.lineWidth = lw;
      ctx.shadowColor = '#A855F7';
      ctx.shadowBlur = blur * waveIntensity;
      ctx.stroke();
      ctx.shadowBlur = 0;
    });

    // flat baseline when silent
    if (waveIntensity < 1) {
      const flatAlpha = (1 - waveIntensity) * 0.9;
      const flatGrad = ctx.createLinearGradient(x0, 0, x1, 0);
      flatGrad.addColorStop(0,   'rgba(168,85,247,0)');
      flatGrad.addColorStop(0.15,'rgba(168,85,247,' + flatAlpha + ')');
      flatGrad.addColorStop(0.85,'rgba(168,85,247,' + flatAlpha + ')');
      flatGrad.addColorStop(1,   'rgba(168,85,247,0)');
      ctx.beginPath();
      ctx.moveTo(x0, cy); ctx.lineTo(x1, cy);
      ctx.strokeStyle = flatGrad;
      ctx.lineWidth = 1.5;
      ctx.shadowColor = '#A855F7';
      ctx.shadowBlur = 10 * (1 - waveIntensity);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // side decorations (tick marks)
    [[x0 - 12, -1],[x1 + 12, 1]].forEach(([bx, dir]) => {
      for (let i = -3; i <= 3; i++) {
        const ty = cy + i * 10;
        const tlen = i === 0 ? 8 : 4;
        ctx.beginPath();
        ctx.moveTo(bx, ty);
        ctx.lineTo(bx + dir * tlen, ty);
        ctx.strokeStyle = `rgba(168,85,247,${i===0?0.7:0.25})`;
        ctx.lineWidth = i===0?1.5:0.8;
        ctx.stroke();
      }
    });

    requestAnimationFrame(drawHUD);
  }
  drawHUD();

  window.setWaveform = function(active) { speaking = active; };
})();

/* ═══════════════════════════════════════════════════════════
   INTRO SEQUENCE
═══════════════════════════════════════════════════════════ */
setTimeout(() => {
  // shrink cube
  shrinkCube();

  // after transition, show brand text
  setTimeout(() => {
    document.getElementById('brand-text').classList.add('visible');
    document.getElementById('intro').classList.add('fade-out');
    setTimeout(() => {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      // welcome message
      setTimeout(() => streamAIMessage(WELCOME_MSG), 400);
    }, 700);
  }, 900);
}, 2600);

/* ═══════════════════════════════════════════════════════════
   CHAT LOGIC
═══════════════════════════════════════════════════════════ */
const WELCOME_MSG = "Hello. I'm RetAIm — your intelligent retention engine. I help you capture insights, surface patterns, and stay aligned with what matters most. What would you like to explore today?";

const AI_RESPONSES = [
  "Analyzing your query through multi-layered neural pathways... The pattern suggests a strong correlation between intent alignment and long-term retention. Here's what I found.",
  "Interesting signal detected. Retention frameworks often break down at the execution layer — not at strategy. Let me map out the critical nodes for you.",
  "Your input resonates with a behavioral clustering model I maintain. The key leverage point here is consistent micro-reinforcement. Want me to elaborate on the architecture?",
  "Processing... The data surface indicates three high-probability intervention zones. Shall I prioritize by impact score or implementation speed?",
  "Neural alignment confirmed. The insight matrix shows a divergence between stated goals and active attention. RetAIm is recalibrating your focus vector now.",
];

const chatWrap = document.getElementById('chat-wrap');
let streaming = false;

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? 'AI' : 'U';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  div.appendChild(avatar);
  div.appendChild(bubble);
  chatWrap.appendChild(div);
  chatWrap.scrollTop = chatWrap.scrollHeight;
  return bubble;
}

function streamAIMessage(text) {
  if (streaming) return;
  streaming = true;
  setWaveform(true);

  const div = document.createElement('div');
  div.className = 'msg ai';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  div.appendChild(avatar);
  div.appendChild(bubble);
  chatWrap.appendChild(div);

  const cursor = document.createElement('span');
  cursor.className = 'cursor-blink';
  bubble.appendChild(cursor);

  let i = 0;
  const words = text.split(' ');
  function nextWord() {
    if (i < words.length) {
      const textNode = document.createTextNode((i > 0 ? ' ' : '') + words[i]);
      bubble.insertBefore(textNode, cursor);
      i++;
      chatWrap.scrollTop = chatWrap.scrollHeight;
      setTimeout(nextWord, 38 + Math.random() * 40);
    } else {
      cursor.remove();
      streaming = false;
      setWaveform(false);
    }
  }
  nextWord();
}

// Input handlers
const input  = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function handleSend() {
  const val = input.value.trim();
  if (!val || streaming) return;
  addMessage(val, 'user');
  input.value = '';
  const resp = AI_RESPONSES[Math.floor(Math.random() * AI_RESPONSES.length)];
  setTimeout(() => streamAIMessage(resp), 300);
}

sendBtn.addEventListener('click', handleSend);
input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
</script>
