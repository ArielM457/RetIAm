<script>
        // Micro-interaction: Timer Logic
        let time = 2700; // 45:00 in seconds
        const timerDisplay = document.getElementById('exam-timer');
        
        setInterval(() => {
            time--;
            const minutes = Math.floor(time / 60);
            const seconds = time % 60;
            timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            if (time < 300) { // Last 5 mins
                timerDisplay.classList.remove('text-primary');
                timerDisplay.classList.add('text-error');
            }
        }, 1000);

        // Custom Radio Styling Logic
        document.querySelectorAll('.option-radio').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.querySelectorAll('.option-radio').forEach(r => {
                    const circle = r.nextElementSibling.querySelector('.bg-primary');
                    circle.style.opacity = r.checked ? '1' : '0';
                });
            });
        });

        // Initialize first check
        document.getElementById('opt1').dispatchEvent(new Event('change'));
    </script>
